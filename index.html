<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Notes</h1>

      <div class="controls">
        <input id="search" placeholder="Search notes" />

        <button id="new-note-btn">Search Note</button>
      </div>

      <div id="editor">
        <input id="title" placeholder="Note title" />
        <input id="author" placeholder="Author name" />
        <textarea id="content" rows="4" placeholder="Write note..."></textarea>

        <button id="save-btn">Save Note</button>
      </div>

      <ul id="notes-list" class="notes">
        <!-- <li class="note">
          <div class="note-title">Title</div>
          <div>Note content lore</div>

          <div class="note-actions">
            <button>Edit</button>
            <button>Delete</button>
          </div>
        </li> -->
      </ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
